name: Text Request
description: Request a new Greek text to be added to Lyceum
title: "[Text Request] "
labels: ["text-request", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Want to see a new text added to Lyceum? 📜
        
        Tell us what you'd like to read, and we'll prioritize based on community interest and source availability.
        
        **Note**: Texts must be generated by the [orchestrator pipeline](https://github.com/lyceum-quest/orchestrator). If you'd like to generate it yourself, see the orchestrator README for setup instructions.

  - type: input
    id: author
    attributes:
      label: Author
      description: Name of the ancient author
      placeholder: "Homer"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Work Title
      description: Title of the work
      placeholder: "Iliad"
    validations:
      required: true

  - type: input
    id: passage
    attributes:
      label: Specific Passage
      description: "Which part? (e.g., `Book 1`, `1.1–50`, `entire work`)"
      placeholder: "Book 1, lines 1–100"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to you?
      options:
        - High (actively studying/teaching this text)
        - Medium (would use it regularly)
        - Low (nice to have)
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why would you like this text added?
      placeholder: |
        I'm teaching an intro Greek course and want students to practice with this passage.
        
        OR: I'm researching X and need word-level analysis for this section.
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: Suggested Sources
      description: |
        (Optional) Do you know of good sources for this text?
        
        For each source, include:
        - Title and URL
        - Editor/translator and year
        - License (public domain, CC-BY-SA, etc.)
        - Format (TEI XML, plain text, PDF, etc.)
      placeholder: |
        **Greek source**: Perseus Digital Library, Homeri Opera (D.B. Monro & T.W. Allen, 1920), CC-BY-SA, TEI XML
        https://www.perseus.tufts.edu/hopper/text?doc=Perseus:text:1999.01.0133
        
        **English witness**: A.T. Murray (1924), public domain, plain text
        https://www.perseus.tufts.edu/hopper/text?doc=Perseus:text:1999.01.0134
    validations:
      required: false

  - type: textarea
    id: additional_info
    attributes:
      label: Additional Information
      description: Anything else we should know?
      placeholder: |
        This text is frequently assigned in undergraduate courses.
        Multiple good commentaries available (Denniston & Page, etc.).
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgment
      description: By submitting this request, you agree to the following
      options:
        - label: I have checked that this text has not already been requested
          required: true
        - label: I understand that text prioritization depends on community interest and source availability
          required: true
        - label: I understand that I can generate this text myself using the orchestrator pipeline if I want it sooner
          required: false
